<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetWalk - Adicionar Pet</title>
</head>
<body>
  <header>
    <a href="perfil-pets.html">‹ Voltar</a>
    <img src="https://img.icons8.com/ios-filled/24/menu--v1.png" alt="Menu">
    <h1>Adi Pet (+)</h1>
  </header>

  <main>
    <label>Nome:</label><br>
    <input type="text" value="Mel"><br><br>

    <label>Espécie:</label><br>
    Cachorro | Gato | Outro<br><br>

    <label>Raça:</label><br>
    <input type="text" value="Border Collie"><br><br>

    <label>Porte:</label><br>
    Pequeno | Médio | Grande<br><br>

    <label>Cor/Pelagem:</label><br>
    <input type="text" value="Preto e Branco"><br><br>

    <label>Comportamento:</label><br>
    <select>
      <option>Agitado</option>
      <option selected>Amigável</option>
      <option>Tímido</option>
    </select><br><br>

    <label>Idade:</label><br>
    <input type="text" value="4 anos"><br><br>

    <a href="perfil-pet.html">Salvar Pet</a><br>
    <a href="perfil-pets.html">Cancelar</a>
  </main>
</body>
</html>
